version: "3.9"

services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: lamtube-rustfs
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_INTERNAL_URL=http://localhost:9000
      - RUSTFS_PUBLIC_URL_PREFIX=http://localhost:9000
      - RUSTFS_UPLOAD_PATH=/data/uploads
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin

    volumes:
      - ./rustfs_data:/data/uploads
